name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Export TMDb key as Gradle property
        # The legacy buildConfigField line in app/build.gradle interpolates myTMDBApiKey
        # as a Java string literal verbatim, so the property value must include
        # surrounding quotes. Re-export the raw secret with quotes added here.
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          if [ -z "${TMDB_API_KEY}" ]; then
            echo "::error::TMDB_API_KEY secret is not set. Add it under repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "ORG_GRADLE_PROJECT_myTMDBApiKey=\"${TMDB_API_KEY}\"" >> "$GITHUB_ENV"

      - name: Lint
        run: ./gradlew lint --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug
        run: ./gradlew assembleDebug --stacktrace

      # Enable once Spotless / Detekt / Kover are wired:
      # - run: ./gradlew spotlessCheck detekt koverVerify --stacktrace

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_id }}
          path: |
            app/build/reports/
            app/build/outputs/lint-results-*.html
          retention-days: 7
          if-no-files-found: ignore
